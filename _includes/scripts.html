<script>
document.addEventListener('DOMContentLoaded', function () {
  // 1. Select all elements with your chosen class
  const popoverElements = document.querySelectorAll('.mypopover');

  // 2. Loop through each element found
  popoverElements.forEach(function (el) {
    // 3. Initialize the popover with 'manual' trigger
    const popover = new bootstrap.Popover(el, {
      trigger: 'manual'
    });

    // 4. Show it immediately
    popover.show();
  });
});
</script>
